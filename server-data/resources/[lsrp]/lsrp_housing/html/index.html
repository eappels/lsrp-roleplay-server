<!doctype html>
<html lang="en" style="background: transparent !important; background-color: transparent !important;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSRP Housing</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      background-color: transparent !important;
      overflow: hidden;
    }

    body {
      display: none;
      visibility: hidden;
      opacity: 0;
    }
  </style>
  <link rel="stylesheet" href="style.css?v=20260329a">
</head>
<body class="nui-closed" style="display: none; visibility: hidden; opacity: 0; background: transparent !important; background-color: transparent !important;">
  <div id="app" class="hidden" style="display: none;" aria-hidden="true">
    <div id="toast" class="toast hidden"></div>

    <section id="keypad" class="panel hidden">
      <div class="panel-header">
        <h1>Apartment Keypad</h1>
        <button class="ghost" data-close="closeKeypad">Close</button>
      </div>
      <p class="panel-copy">Enter your apartment number to enter the instance.</p>
      <div id="display" class="display"></div>
      <div class="keypad-grid">
        <button class="digit">1</button>
        <button class="digit">2</button>
        <button class="digit">3</button>
        <button class="digit">4</button>
        <button class="digit">5</button>
        <button class="digit">6</button>
        <button class="digit">7</button>
        <button class="digit">8</button>
        <button class="digit">9</button>
        <button id="clearKeypad" class="accent-danger">CLR</button>
        <button class="digit">0</button>
        <button id="submitKeypad" class="accent-primary">ENTER</button>
      </div>
    </section>

    <section id="catalog" class="panel hidden">
      <div class="panel-header">
        <h1>Apartment Catalog</h1>
        <button class="ghost" data-close="closeCatalog">Close</button>
      </div>
      <p class="panel-copy">Browse unowned apartments and rent one instantly using your LS$ balance.</p>
      <div id="catalogList" class="list"></div>
    </section>

    <section id="kiosk" class="panel panel-wide hidden">
      <div class="panel-header">
        <h1>Rent Kiosk</h1>
        <button class="ghost" data-close="closeKiosk">Close</button>
      </div>
      <div class="columns">
        <div>
          <h2>Your Apartments</h2>
          <div id="ownedList" class="list"></div>
        </div>
        <div>
          <h2>Available Apartments</h2>
          <div id="availableList" class="list"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="app.js?v=20260329a"></script>
</body>
</html>
