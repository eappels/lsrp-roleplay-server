<!doctype html>
<html lang="en" style="background: transparent !important; background-color: transparent !important;">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>LSRP HUD</title>
	<style>
		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: transparent !important;
			background-color: transparent !important;
		}

		.hud-root--hidden,
		.is-hidden {
			display: none !important;
		}
	</style>
	<link rel="stylesheet" href="hud.css">
</head>
<body>
	<div id="hud-root" class="hud-root hud-root--hidden" aria-hidden="true">
		<section id="vehicle-shell" class="compass-frame is-hidden" aria-hidden="true">
			<div class="compass-glow"></div>
			<div class="status-bar">
				<div class="status-chip status-chip--left">
					<span class="status-label">Vehicle</span>
					<strong id="vehicle-name">Vehicle</strong>
				</div>
				<div class="status-chip status-chip--center">
					<span id="heading-number" class="heading-number">000</span>
					<span id="heading-cardinal" class="heading-cardinal">N</span>
				</div>
				<div class="status-chip status-chip--right">
					<span class="status-label">Speed</span>
					<strong id="speed-value">0</strong>
					<span class="speed-unit">KM/H</span>
				</div>
			</div>

			<div class="compass-track-wrap">
				<div class="center-needle"></div>
				<div id="compass-track" class="compass-track"></div>
			</div>

			<div class="location-bar">
				<span id="street-value">Unknown Road</span>
				<span class="location-divider"></span>
				<span id="area-value">San Andreas</span>
			</div>
		</section>

		<aside id="needs-shell" class="needs-shell is-hidden" aria-hidden="true">
				<div class="needs-panel">
					<div id="hunger-indicator" class="needs-indicator" aria-label="Hunger 100%">
						<div class="needs-indicator__icon-wrap" aria-hidden="true">
							<svg class="needs-indicator__svg" viewBox="0 0 64 64">
								<path class="needs-indicator__icon-base" d="M18 16c0-2.21 1.79-4 4-4h20c2.21 0 4 1.79 4 4v6c3.87 1.41 6.78 5.02 7.39 9.35l1.25 8.72A6 6 0 0 1 48.7 47H15.3a6 6 0 0 1-5.94-6.93l1.25-8.72C11.22 27.02 14.13 23.41 18 22v-6Zm6 0v5h16v-5H24Zm-6.24 13.77-.95 6.64h30.38l-.95-6.64A4.04 4.04 0 0 0 42.28 26H21.72a4.04 4.04 0 0 0-3.96 3.77ZM18.5 41.41a2.5 2.5 0 1 0 0 5h27a2.5 2.5 0 1 0 0-5h-27Z" />
							</svg>
						</div>
						<div class="needs-indicator__meter-wrap">
							<div class="needs-indicator__label-row">
								<span class="needs-indicator__label">Hunger</span>
								<span id="hunger-value" class="needs-indicator__value">100%</span>
							</div>
							<div class="needs-indicator__meter">
								<div id="hunger-fill-bar" class="needs-indicator__fill"></div>
							</div>
						</div>
					</div>

					<div id="thirst-indicator" class="needs-indicator is-hidden" aria-label="Thirst 100%">
						<div class="needs-indicator__icon-wrap" aria-hidden="true">
							<svg class="needs-indicator__svg" viewBox="0 0 64 64">
								<path class="needs-indicator__icon-base" d="M37.67 8.68a4 4 0 0 1 5.66 0l2 2a4 4 0 0 1 0 5.66l-4.6 4.6 7.54 20.52A10 10 0 0 1 38.89 55H25.11a10 10 0 0 1-9.38-13.54l7.54-20.52-4.6-4.6a4 4 0 0 1 0-5.66l2-2a4 4 0 0 1 5.66 0L32 14.34l5.67-5.66ZM27.9 22.98l-8.67 23.58A4 4 0 0 0 22.98 52h18.04a4 4 0 0 0 3.75-5.44L36.1 22.98a4 4 0 0 1 .95-4.14l5.45-5.45-1.66-1.66-5.45 5.44a4 4 0 0 1-5.66 0l-5.45-5.44-1.66 1.66 5.45 5.45a4 4 0 0 1 .95 4.14Z" />
							</svg>
						</div>
						<div class="needs-indicator__meter-wrap">
							<div class="needs-indicator__label-row">
								<span class="needs-indicator__label">Thirst</span>
								<span id="thirst-value" class="needs-indicator__value">100%</span>
							</div>
							<div class="needs-indicator__meter">
								<div id="thirst-fill-bar" class="needs-indicator__fill"></div>
							</div>
						</div>
					</div>
				</div>
		</aside>

		<aside id="fuel-shell" class="fuel-shell is-hidden" aria-hidden="true">
			<div class="needs-panel">
				<div id="fuel-indicator" class="needs-indicator needs-indicator--fuel" aria-label="Fuel 100%">
					<div class="needs-indicator__icon-wrap" aria-hidden="true">
						<svg class="needs-indicator__svg" viewBox="0 0 64 64">
							<path class="needs-indicator__icon-base" d="M18 12a4 4 0 0 1 4-4h16a4 4 0 0 1 4 4v6h3a5 5 0 0 1 5 5v22a11 11 0 0 1-11 11h-1a3 3 0 0 1 0-6h1a5 5 0 0 0 5-5V24h-4v16a4 4 0 0 1-4 4H22a4 4 0 0 1-4-4V12Zm6 2v20h12V14H24Zm24 10h4v9h-4v-9Z" />
						</svg>
					</div>
					<div class="needs-indicator__meter-wrap">
						<div class="needs-indicator__label-row">
							<span class="needs-indicator__label">Fuel</span>
							<span id="fuel-value" class="needs-indicator__value">100%</span>
						</div>
						<div class="needs-indicator__meter">
							<div id="fuel-fill-bar" class="needs-indicator__fill"></div>
						</div>
					</div>
				</div>
			</div>
		</aside>
	</div>

	<script src="hud.js"></script>
</body>
</html>
