<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSRP Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="inventory-shell">
            <header class="inventory-header">
                <div>
                    <p class="eyebrow">LSRP</p>
                    <h1>Inventory</h1>
                    <p class="layout-tag">3x3 Grid Layout</p>
                </div>
                <button id="close-btn" type="button" class="close-btn">Close</button>
            </header>

            <section class="inventory-summary">
                <div class="summary-card">
                    <span class="summary-label">Slots Used</span>
                    <strong id="slots-text">0 / 0</strong>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Carry Weight</span>
                    <strong id="weight-text">0 / 0</strong>
                </div>
            </section>

            <section class="inventory-transfer">
                <div class="transfer-field">
                    <label for="transfer-target-id">Target ID</label>
                    <input id="transfer-target-id" type="number" min="1" step="1" placeholder="Server ID">
                </div>

                <button id="open-target-btn" type="button" class="transfer-btn">Open Target Inventory</button>
            </section>

            <section class="inventory-body">
                <div class="inventory-panels" id="inventory-panels">
                    <section class="inventory-panel">
                        <header class="panel-header">
                            <h2>Your Inventory</h2>
                        </header>
                        <div id="self-grid" class="slot-grid"></div>
                    </section>

                    <section class="inventory-panel" id="target-panel">
                        <header class="panel-header">
                            <h2 id="target-panel-title">Target Inventory</h2>
                        </header>
                        <div id="target-grid" class="slot-grid"></div>
                    </section>
                </div>
            </section>

            <footer class="inventory-footer">
                <p id="status-text">Press ESC to close.</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
