<!DOCTYPE html>
<html lang="en" style="background: transparent !important; background-color: transparent !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSRP Shops</title>
    <style>
        html,
        body {
            background: transparent !important;
            background-color: transparent !important;
        }

        body {
            display: none;
            visibility: hidden;
            opacity: 0;
        }
    </style>
    <link rel="stylesheet" href="style.css?v=20260329a">
</head>
<body style="display: none; visibility: hidden; opacity: 0; background: transparent !important; background-color: transparent !important;">
    <div id="app" class="hidden" aria-hidden="true">
        <div class="backdrop"></div>
        <main class="panel">
            <header class="panel-header">
                <div>
                    <p id="catalog-label" class="eyebrow">24/7 Essentials</p>
                    <h1 id="shop-name">24/7 Supermarket</h1>
                    <p id="shop-subtitle" class="subtitle">Quick essentials.</p>
                </div>
                <div class="header-actions">
                    <div class="balance-card">
                        <span class="balance-label">Available</span>
                        <strong id="balance-text">LS$0</strong>
                    </div>
                    <button id="close-btn" class="close-btn" type="button" aria-label="Close">Close</button>
                </div>
            </header>

            <section class="panel-meta">
                <p>Walk-up purchases for quick RP essentials. Inventory limits still apply.</p>
            </section>

            <section id="item-grid" class="item-grid"></section>
        </main>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="script.js?v=20260329a"></script>
</body>
</html>
