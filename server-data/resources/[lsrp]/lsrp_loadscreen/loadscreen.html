<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loading Screen</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <img id="logo" src="image-generator.png">

        <div id="loading-wrapper" aria-label="Loading progress">
            <div id="loading-bar-track">
                <div id="loading-bar-fill"></div>
            </div>
            <div id="loading-status">Waiting for server</div>
        </div>

        <script>
            // PREJOIN UI state and handlers
            var PREJOIN = (function () {
                var container = null;
                var remembered = null;

                function createUi() {
                    container = document.createElement('div');
                    container.id = 'prejoin-container';
                    container.innerHTML = `
                        <div id="prejoin-modal" class="hidden">
                            <div id="prejoin-box">
                                <h2>Account Login</h2>
                                <div id="prejoin-msg"></div>
                                <input id="prejoin-email" type="email" placeholder="Email">
                                <input id="prejoin-password" type="password" placeholder="Password">
                                <label><input id="prejoin-remember" type="checkbox"> Remember me</label>
                                <div class="prejoin-buttons">
                                    <button id="prejoin-login">Login</button>
                                    <button id="prejoin-register">Register</button>
                                </div>
                            </div>
                            <div id="prejoin-map" class="hidden">
                                <h3>Choose a spawn location</h3>
                                <div id="spawn-list"></div>
                            </div>
                        </div>
                    `;

                    document.body.appendChild(container);

                    document.getElementById('prejoin-login').addEventListener('click', onLogin);
                    document.getElementById('prejoin-register').addEventListener('click', onRegister);
                }

                function showLogin(spawnPoints) {
                    if (!container) createUi();
                    document.getElementById('prejoin-modal').classList.remove('hidden');
                    document.getElementById('prejoin-map').classList.add('hidden');
                    document.getElementById('prejoin-msg').textContent = '';

                    // fill remembered creds
                    try {
                        var saved = localStorage.getItem('lsrp_saved_creds');
                        if (saved) {
                            var obj = JSON.parse(saved);
                            document.getElementById('prejoin-email').value = obj.email || '';
                            document.getElementById('prejoin-remember').checked = !!obj.remember;
                        }
                    } catch (e) {}

                    // populate spawn list (saved for later)
                    container._spawnPoints = spawnPoints || [];
                    var list = document.getElementById('spawn-list');
                    list.innerHTML = '';
                    (spawnPoints || []).forEach(function (p, idx) {
                        var btn = document.createElement('button');
                        btn.textContent = (p.label || ('Spawn ' + (idx+1)));
                        btn.addEventListener('click', function () {
                            selectSpawn(idx);
                        });
                        list.appendChild(btn);
                    });
                }

                function showMap() {
                    document.getElementById('prejoin-map').classList.remove('hidden');
                    document.getElementById('prejoin-msg').textContent = 'Select a location to spawn';
                }

                function onLogin() {
                    var email = document.getElementById('prejoin-email').value || '';
                    var password = document.getElementById('prejoin-password').value || '';
                    var remember = document.getElementById('prejoin-remember').checked || false;

                    fetch(`https://${GetParentResourceName()}/prejoinLogin`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: password })
                    }).then(function (r) { return r.json(); }).then(function (data) {
                        if (data && data.success) {
                            if (remember) {
                                localStorage.setItem('lsrp_saved_creds', JSON.stringify({ email: email, remember: true }));
                            } else {
                                localStorage.removeItem('lsrp_saved_creds');
                            }
                            showMap();
                        } else {
                            document.getElementById('prejoin-msg').textContent = data && data.reason ? data.reason : 'Login failed';
                        }
                    }).catch(function () {
                        document.getElementById('prejoin-msg').textContent = 'Network error';
                    });
                }

                function onRegister() {
                    var email = document.getElementById('prejoin-email').value || '';
                    var password = document.getElementById('prejoin-password').value || '';
                    fetch(`https://${GetParentResourceName()}/prejoinRegister`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: password })
                    }).then(function (r) { return r.json(); }).then(function (data) {
                        if (data && data.success) {
                            document.getElementById('prejoin-msg').textContent = 'Registered. You may now login.';
                        } else {
                            document.getElementById('prejoin-msg').textContent = data && data.reason ? data.reason : 'Registration failed';
                        }
                    }).catch(function () {
                        document.getElementById('prejoin-msg').textContent = 'Network error';
                    });
                }

                function selectSpawn(idx) {
                    var spawn = (container && container._spawnPoints && container._spawnPoints[idx]) || null;
                    if (!spawn) return;
                    fetch(`https://${GetParentResourceName()}/prejoinSpawnSelect`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ spawnIndex: idx })
                    }).then(function (r) { return r.json(); }).then(function (data) {
                        if (data && data.success) {
                            // hide UI
                            document.getElementById('prejoin-modal').classList.add('hidden');
                        } else {
                            document.getElementById('prejoin-msg').textContent = data && data.reason ? data.reason : 'Spawn failed';
                        }
                    }).catch(function () {
                        document.getElementById('prejoin-msg').textContent = 'Network error';
                    });
                }

                return {
                    showLogin: showLogin
                };
            })();

            (function () {
                var fill = document.getElementById('loading-bar-fill');
                var status = document.getElementById('loading-status');

                var shownPercent = 0;
                var targetPercent = 0;
                var animationFrame = null;

                var initCount = 0;
                var mapLoadCount = 0;
                var mapLoadDone = 0;

                function clamp(value, min, max) {
                    return Math.max(min, Math.min(max, value));
                }

                function render(value) {
                    fill.style.width = value + '%';
                }

                function setStatus(text) {
                    if (typeof text === 'string' && text.length > 0) {
                        status.textContent = text;
                    }
                }

                function tick() {
                    if (shownPercent >= targetPercent) {
                        animationFrame = null;
                        return;
                    }

                    var delta = targetPercent - shownPercent;
                    shownPercent = Math.min(targetPercent, shownPercent + Math.max(0.25, delta * 0.2));
                    render(shownPercent);

                    animationFrame = window.requestAnimationFrame(tick);
                }

                function setTargetPercent(nextPercent) {
                    var clamped = clamp(nextPercent, 0, 100);

                    if (clamped <= targetPercent) {
                        return;
                    }

                    targetPercent = clamped;

                    if (animationFrame === null) {
                        animationFrame = window.requestAnimationFrame(tick);
                    }
                }

                function setSegmentProgress(idx, count, startPercent, endPercent) {
                    if (!count || count <= 0) {
                        return;
                    }

                    var ratio = clamp(idx / count, 0, 1);
                    var progress = startPercent + ((endPercent - startPercent) * ratio);
                    setTargetPercent(progress);
                }

                var handlers = {
                    loadProgress: function (data) {
                        var value = null;

                        if (typeof data.loadFraction === 'number') {
                            value = data.loadFraction * 100;
                        } else if (typeof data.progress === 'number') {
                            value = data.progress <= 1 ? data.progress * 100 : data.progress;
                        } else if (typeof data.percent === 'number') {
                            value = data.percent;
                        }

                        if (value !== null) {
                            setTargetPercent(value);
                        }
                    },

                    startInitFunctionOrder: function (data) {
                        initCount = Number(data.count) || initCount;
                        setStatus('Initializing game state');
                        setTargetPercent(5);
                    },

                    initFunctionInvoking: function (data) {
                        var idx = Number(data.idx) || 0;
                        var count = Number(data.count) || initCount;
                        setSegmentProgress(idx, count, 5, 45);
                    },

                    initFunctionInvoked: function (data) {
                        var idx = Number(data.idx) || 0;
                        var count = Number(data.count) || initCount;
                        setSegmentProgress(idx, count, 5, 45);
                    },

                    startDataFileEntries: function (data) {
                        mapLoadCount = Number(data.count) || 0;
                        mapLoadDone = 0;
                        setStatus('Loading map assets');
                        setTargetPercent(50);
                    },

                    performMapLoadFunction: function (data) {
                        if (typeof data.idx === 'number') {
                            mapLoadDone = Number(data.idx);
                        } else {
                            mapLoadDone = mapLoadDone + 1;
                        }

                        setSegmentProgress(mapLoadDone, mapLoadCount || mapLoadDone, 50, 92);
                    },

                    onDataFileEntry: function (data) {
                        if (typeof data.idx === 'number') {
                            mapLoadDone = Number(data.idx);
                        } else {
                            mapLoadDone = mapLoadDone + 1;
                        }

                        setSegmentProgress(mapLoadDone, mapLoadCount || mapLoadDone, 50, 92);
                    },

                    endDataFileEntries: function () {
                        setStatus('Finalizing connection');
                        setTargetPercent(95);
                    },

                    onLogLine: function (data) {
                        setStatus(data.message);
                    },

                    lsrpProgress: function (data) {
                        if (typeof data.progress === 'number') {
                            setTargetPercent(data.progress);
                        }

                        if (typeof data.status === 'string') {
                            setStatus(data.status);
                        }
                    }
                    ,
                    // Prejoin show; payload: { spawnPoints: [] }
                    prejoin_show: function (data) {
                        PREJOIN.showLogin(data.spawnPoints || []);
                    }
                };

                window.addEventListener('message', function (event) {
                    var data = event.data || {};
                    var handler = handlers[data.eventName];

                    if (handler) {
                        handler(data);
                    }
                });

                render(0);
                setTargetPercent(1);
            })();
        </script>
    </body>
</html>
